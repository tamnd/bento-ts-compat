name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Re-run weekly so a bento release that changes lowering surfaces on its own,
    # even on a week with no compat commits.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Keep the harness itself healthy: formatting, vet, a clean build, the linter,
  # and the format-layer unit tests that need no corpus.
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt -s -w:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: latest
      - name: Format-layer unit tests
        run: go test ./suite/ -run 'TestParse|TestDirectives|TestSplitFiles|TestIsMultiFile|TestOracle'

  # T0, T1, and T3 over the whole corpus: build-check every accepted emit, check
  # the classification against the committed status/ledger.txt, byte-check every
  # accepted case against its golden, and check that no error case bento runs is
  # missing from status/diagnostics.txt. The tests share one cached corpus
  # classification, so the corpus is driven through the front end once, and T3 adds
  # only error-baseline reads on top. A handback that became a miscompile fails the
  # ledger check, an emit that drifted fails the golden check, and a program
  # TypeScript rejects that bento newly runs fails the diagnostics check. The run
  # bounds its fan-out with -jobs, because every case holds a checker and a build
  # in memory and an unbounded run exhausts the runner.
  classify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: Classify the corpus, check the ledger, goldens, and diagnostics
        run: |
          go test ./suite/ \
            -run 'TestStructure|TestLedger|TestEmitGolden|TestDiagnostics' \
            -jobs 2 \
            -timeout 50m \
            -v

  # T2 smoke: compile and run one shard of the cases that have a frozen oracle and
  # check the output against it. This runs on every push and pull request as a fast
  # runtime signal without paying for the whole go-run pass. It needs no Node: the
  # oracles are frozen data, and only the Go toolchain runs here. A runtime-wrong
  # case outside status/runtime.txt fails the shard.
  runtime-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: Runtime tier, smoke shard
        run: |
          go test ./suite/ \
            -run TestRuntime \
            -shard 0/8 \
            -jobs 2 \
            -timeout 40m \
            -v

  # T2 full: the whole runtime pass, split into eight shards run in parallel so no
  # single job compiles and runs every case. It is heavy, a go run per case, so it
  # runs on the weekly schedule and on demand rather than on every push. Each shard
  # holds the same ratchet, so a fresh runtime-wrong fails whichever shard it lands
  # in.
  runtime-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
      - name: Runtime tier, shard ${{ matrix.shard }} of 8
        run: |
          go test ./suite/ \
            -run TestRuntime \
            -shard ${{ matrix.shard }}/8 \
            -jobs 2 \
            -timeout 40m \
            -v
